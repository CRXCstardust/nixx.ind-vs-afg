<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NIXxCRIXZY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#0a1733" />
  <meta name="referrer" content="no-referrer" />
 
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
 
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.min.js" crossorigin="anonymous"></script>
 
  <style>
    :root {
      --blue1: #0b3b8c;
      --blue2: #072b6a;
      --bg: #0a1733;
      --text: #ffffff;
      --accent: #1e78ff;
      --card-border: rgba(30, 120, 255, 0.25);
      --shadow: rgba(0, 0, 0, 0.25);
      --transition: all 0.2s ease;
    }
 
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
    }
 
    .container { max-width: 980px; margin: 14px auto 0; padding: 0 12px 24px; }
 
    .header {
      background: linear-gradient(135deg, var(--blue1), var(--blue2));
      font-weight: 800;
      text-align: center;
      padding: 12px 16px;
      border-radius: 12px;
      letter-spacing: 0.4px;
      box-shadow: 0 8px 20px var(--shadow);
      border: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 12px;
    }
 
    .player-panel {
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      margin: 12px 0;
      box-shadow: 0 10px 26px var(--shadow);
      border: 3px solid var(--card-border);
      position: relative;
    }
 
    .player-wrapper { width: 100%; position: relative; }
    .video-player { width: 100%; aspect-ratio: 16/9; background: #000; display: block; }
    .shaka-spinner-container, .shaka-buffering-spinner, .shaka-spinner { display: none !important; }
 
    .error-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.9);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 11; gap: 12px; padding: 20px; text-align: center;
    }
    .error-overlay.visible { display: flex; }
    .error-message { font-size: 15px; opacity: 0.9; max-width: 320px; }
 
    .retry-btn {
      padding: 10px 24px; border-radius: 8px;
      background: var(--accent); color: #fff; border: none;
      font-weight: 700; font-size: 14px; cursor: pointer; transition: var(--transition);
    }
    .retry-btn:hover { background: #3388ff; transform: translateY(-1px); }
 
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(30,30,30,0.95); color: #fff;
      padding: 12px 24px; border-radius: 10px;
      font-size: 14px; font-weight: 600;
      z-index: 2000; pointer-events: none; opacity: 0;
      transition: all 0.35s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4); white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
 
    .section {
      background: linear-gradient(135deg, var(--blue1), var(--blue2));
      border-radius: 12px; padding: 14px; margin: 12px 0;
      box-shadow: 0 8px 20px var(--shadow);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .section-title { margin: 0 0 10px; text-align: center; font-size: 18px; letter-spacing: 0.2px; }
    .section-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .section-wrapper { display: flex; gap: 12px; }
    .section-wrapper .section { flex: 1; margin: 0; }
 
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 16px; border-radius: 12px;
      font-weight: 700; font-size: 14px;
      background: transparent; color: #fff;
      border: 2px solid rgba(255,255,255,0.85);
      text-decoration: none; cursor: pointer; transition: var(--transition);
    }
    .btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
    .btn-icon { width: 20px; height: 20px; }
 
    .popup-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
    }
    .popup-overlay.visible { display: flex; }
    .popup-card {
      background: linear-gradient(135deg, #1a3a6e, #0d2247);
      border-radius: 16px; padding: 28px; text-align: center;
      max-width: 380px; width: 100%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .popup-title { font-size: 22px; font-weight: 800; margin-bottom: 20px; }
    .popup-btn {
      display: block; width: 100%; padding: 12px; border: none;
      border-radius: 10px; font-weight: 700; font-size: 15px;
      cursor: pointer; margin-top: 10px; transition: var(--transition);
    }
    .popup-btn-primary { background: #0088cc; color: #fff; }
    .popup-btn-primary:hover { background: #009de0; }
    .popup-btn-secondary { background: rgba(255,255,255,0.12); color: #fff; }
    .popup-btn-secondary:hover { background: rgba(255,255,255,0.2); }
 
    .shaka-controls-container { transition: opacity 0.3s ease; }
    .shaka-bottom-controls { padding: 4px 8px !important; }
    .shaka-volume-bar-container { margin: 0 4px; }
    .shaka-overflow-menu, .shaka-settings-menu { border-radius: 8px !important; }

    @media (max-width: 600px) {
      .section-wrapper { flex-direction: column; }
      .section-wrapper .section { margin: 6px 0; }
      .popup-card { padding: 20px; }
      .popup-title { font-size: 18px; }
    }
    @media (max-width: 480px) {
      .btn { width: 100%; justify-content: center; }
      .header { font-size: 14px; padding: 10px 12px; }
      .toast { font-size: 12px; padding: 10px 18px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">NIXxCRIXZY</div>
 
    <div class="player-panel">
      <div class="player-wrapper" data-shaka-player-container id="playerContainer">
        <video id="video" class="video-player" data-shaka-player autoplay playsinline
          controlsList="nodownload noremoteplayback" oncontextmenu="return false"></video>
        <div id="errorOverlay" class="error-overlay">
          <p id="errorMsg" class="error-message">Something went wrong. Please try again.</p>
          <button class="retry-btn" id="retryBtn">Retry</button>
        </div>
      </div>
    </div>
 
    <div id="toast" class="toast"></div>
 
    <div id="tgPopup" class="popup-overlay">
      <div class="popup-card">
        <div class="popup-title">Join NIXxCRIXZY</div>
        <button class="popup-btn popup-btn-primary" id="tgJoinBtn1">Join Now</button>
        <button class="popup-btn popup-btn-secondary" id="tgCloseBtn">Already Joined</button>
      </div>
    </div>
 
    <div class="section-wrapper">
      <div class="section">
        <h3 class="section-title">Follow Us for Updates</h3>
        <div class="section-row">
          <a class="btn" id="joinTgBtn1" target="_blank" rel="noopener noreferrer">
            <img class="btn-icon" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRdqawMR26E_SKOhbCIAqNQCTZ-IUm1x-Rb1zqHhoqPbA" alt="Telegram" />
            Join NIXxCRIXZY
          </a>
        </div>
      </div>
      <div class="section">
        <h3 class="section-title">Share with Friends</h3>
        <div class="section-row">
          <button class="btn" id="btnShare">Share This Page Link</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    "use strict";

const CONFIG = {
  telegramLink: "https://t.me/+RT_XWFZCSE5kNWU1",
  channelsEndpoint: "https://jtvv.pages.dev/channels.json"
};

let channelsCache = null;

const DOM = {
  video: document.getElementById("video"),
  playerContainer: document.getElementById("playerContainer"),
  errorOverlay: document.getElementById("errorOverlay"),
  errorMsg: document.getElementById("errorMsg"),
  retryBtn: document.getElementById("retryBtn"),
  tgPopup: document.getElementById("tgPopup"),
  toast: document.getElementById("toast"),
  btnShare: document.getElementById("btnShare"),
  joinTgBtn1: document.getElementById("joinTgBtn1"),
  tgJoinBtn1: document.getElementById("tgJoinBtn1"),
  tgCloseBtn: document.getElementById("tgCloseBtn")
};

let player = null;
let ui = null;
let toastTimer = null;

function showToast(msg, duration = 2600) {
  clearTimeout(toastTimer);
  DOM.toast.textContent = msg;
  DOM.toast.classList.add("show");
  toastTimer = setTimeout(() => DOM.toast.classList.remove("show"), duration);
}

function showError(msg) {
  DOM.errorMsg.textContent = msg || "Something went wrong. Please try again.";
  DOM.errorOverlay.classList.add("visible");
}

function hideError() {
  DOM.errorOverlay.classList.remove("visible");
}

function extractCookieFromUrl(url) {
  try {
    const match = url.match(/[?&](__hdnea__=[^&]+)/);
    return match ? match[1] : null;
  } catch (_) {
    return null;
  }
}

function stripHdneaFromUrl(url) {
  try {
    const [base, query] = url.split("?");
    if (!query) return url;
    const remaining = query.split("&").filter(p => !p.startsWith("__hdnea__=")).join("&");
    return remaining ? base + "?" + remaining : base;
  } catch (_) {
    return url;
  }
}

function validateChannelMap(channels) {
  if (!channels || typeof channels !== "object" || Array.isArray(channels)) {
    throw new Error("Channels JSON must be an object map.");
  }

  const ids = Object.keys(channels);
  if (!ids.length) throw new Error("Channels JSON is empty.");

  for (const id of ids) {
    const item = channels[id];
    const valid =
      item &&
      typeof item.name === "string" &&
      typeof item.streamUrl === "string" &&
      item.clearKey &&
      typeof item.clearKey.keyId === "string" &&
      typeof item.clearKey.key === "string";

    if (!valid) {
      throw new Error("Invalid channel format for id: " + id);
    }
  }

  return channels;
}

function getChannelsUrl() {
  const params = new URLSearchParams(window.location.search);
  const fromQuery = params.get("channelsUrl");
  return fromQuery || CONFIG.channelsEndpoint;
}

async function getChannels() {
  if (channelsCache) return channelsCache;

  const channelsUrl = getChannelsUrl();
  if (!channelsUrl) {
    throw new Error("Channels JSON URL missing. Pass ?channelsUrl=<json-url> or set CONFIG.channelsEndpoint.");
  }

  const response = await fetch(channelsUrl, { cache: "no-store" });
  if (!response.ok) throw new Error("Channels API HTTP " + response.status);

  const payload = await response.json();
  const map = payload && payload.channels && typeof payload.channels === "object"
    ? payload.channels
    : payload;

  channelsCache = validateChannelMap(map);
  return channelsCache;
}

function resolveCookieFromStream(channel) {
  return extractCookieFromUrl(channel.streamUrl);
}

async function loadShakaPlayer(channel, cookie) {
  hideError();

  if (!window.shaka || !shaka.Player.isBrowserSupported()) {
    showError("This browser is not supported for this stream.");
    return;
  }

  if (!ui) {
    ui = new shaka.ui.Overlay(new shaka.Player(DOM.video), DOM.playerContainer, DOM.video);
    player = ui.getControls().getPlayer();
    player.addEventListener("error", (event) => {
      const code = event.detail && event.detail.code ? event.detail.code : "unknown";
      showError("Playback error (" + code + "). Tap Retry.");
    });
  }

  player.configure({
    drm: {
      clearKeys: {
        [channel.clearKey.keyId]: channel.clearKey.key
      }
    }
  });

  player.getNetworkingEngine().clearAllRequestFilters();
  player.getNetworkingEngine().registerRequestFilter((type, request) => {
    request.headers["Referer"] = "https://www.jiotv.com/";
    request.headers["User-Agent"] = "plaYtv/7.1.3 (Linux;Android 13) ygx/69.1 ExoPlayerLib/824.0";
    if (cookie) {
      request.headers["Cookie"] = cookie;
    }

    if (
      cookie &&
      (type === shaka.net.NetworkingEngine.RequestType.MANIFEST ||
        type === shaka.net.NetworkingEngine.RequestType.SEGMENT) &&
      request.uris[0] &&
      !request.uris[0].includes("__hdnea__=")
    ) {
      const sep = request.uris[0].includes("?") ? "&" : "?";
      request.uris[0] += sep + cookie;
    }
  });

  const loadUrl = cookie ? stripHdneaFromUrl(channel.streamUrl) : channel.streamUrl;
  await player.load(loadUrl);
  showToast("Stream loaded");
}

async function startPlayer() {
  try {
    const channels = await getChannels();
    const params = new URLSearchParams(window.location.search);
    const requestedId = (params.get("id") || params.get("tvid") || "").trim();

    let resolvedId = requestedId;
    if (!channels[resolvedId] && resolvedId) {
      const foundKey = Object.keys(channels).find((key) => key.toLowerCase() === resolvedId.toLowerCase());
      if (foundKey) resolvedId = foundKey;
    }

    const fallbackId = Object.keys(channels)[0];
    if (!resolvedId) {
      resolvedId = fallbackId;
    }

    const channel = channels[resolvedId];
    if (!channel) {
      showError("Invalid id. Use one of: " + Object.keys(channels).join(", "));
      return;
    }

    const cookie = resolveCookieFromStream(channel);
    document.title = channel.name + " - BigCric";
    await loadShakaPlayer(channel, cookie);
  } catch (err) {
    showError(err && err.message ? err.message : "Failed to start playback.");
  }
}

async function handleShare() {
  const shareData = { title: document.title, text: "Watch live on BigCric", url: window.location.href };
  if (navigator.share) {
    try { await navigator.share(shareData); return; } catch (_) {}
  }
  try {
    await navigator.clipboard.writeText(window.location.href);
    showToast("Link copied");
  } catch (_) {
    prompt("Copy this link:", window.location.href);
  }
}

function showTgPopup() { DOM.tgPopup.classList.add("visible"); }
function closeTgPopup() { DOM.tgPopup.classList.remove("visible"); }

function initEvents() {
  DOM.retryBtn.addEventListener("click", startPlayer);
  DOM.btnShare.addEventListener("click", handleShare);
  DOM.tgJoinBtn1.addEventListener("click", () => {
    window.open(CONFIG.telegramLink, "_blank");
    closeTgPopup();
    startPlayer();
  });
  DOM.tgCloseBtn.addEventListener("click", () => {
    closeTgPopup();
    startPlayer();
  });
  DOM.joinTgBtn1.href = CONFIG.telegramLink;
  window.addEventListener("load", showTgPopup);
}

shaka.polyfill.installAll();
initEvents();
  </script>
</body>
</html>
